<!DOCTYPE html>
<html>
<head>
    <title> PR Scrubber </title>
     <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .error-message {
            color: white;
            background-color: red;
            padding: 10px;
            border-radius: 5px;
        }
    </style>

</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col">
                <h1 class="text-center mb-4"> Must Fix PR Scrubber </h1>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <form method="POST" action="/" enctype="multipart/form-data" onsubmit="return validateForm()">
                    <div class="form-group row mt-2">
                        <label for="threshold_value" class="col-md-1 col-form-label">PR Age:</label>
                        <div class="col-md-2">
                            <input type="number" class="form-control" name="threshold_value" value="365" min="1" max="1000">
                        </div>
                        <div class="col-md-3 d-flex align-items-center">
                            <label for="scope" class="mr-3">Scope_Upto:</label>
                            <input type="number" class="form-control" name="scope_value" value="10" min="1" max="15">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="file">Select Excel File:</label>
                        <input type="file" class="form-control-file" name="file" accept=".xlsx, .xls" required>
                    </div>

                    <!-- Rest of the form fields -->
                    <div class="form-group">
                        <label for="drop_values_symptom">Drop Values for Symptom:</label>
                         <input type="text" class="form-control" name="drop_values_symptom" placeholder="" value="ErrorMessage,Upgrade,Usability,Traffic,Stats,Convergence,error,functional,stat,cosmetic,NonService">
                     </div>
                    <div class="form-group">
                        <label for="drop_values_category">Drop Values for Category:</label>
                        <input type="text" class="form-control" name="drop_values_category" placeholder="" value="doc,ui,accounting,infra,packaging,diag,stat,ctrl,configuration,dummy,licensing,log,config,resiliency,test,tool,web,diag,licens,build">
                    </div>
                    <div class="form-group">
                        <label for="drop_values_platform">Drop Values for Platform:</label>
                        <input type="text" class="form-control" name="drop_values_platform" placeholder="" value="vmx,vsrx,vptx,csrx,crpd,vqfx">
                    </div>
                    <div class="form-group">
                        <label for="include_values_found_during">Include Values for Found-During:</label>
                        <input type="text" class="form-control" name="include_values_found_during" placeholder="" value="CCL,Customer,escalation,Support,bug,verification, Product, delivery,feature,Performance,Scaling,regression,FCC,Unit,Production,Proof,Concept,Solution,Unit',nan">
                    </div>
                    <div class="form-group">
        <div class="row">
            <!-- Dropdown Column -->
            <div class="col-md-6">
                <div class="form-group">
                    <label for="dropdown">Select Column Name:</label>
                    <select class="form-control" id="dropdown">
                       {% for option in column_options %}
                        <option value="{{ option }}" {% if option == keyword_col_option %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Input Column -->
            <div class="col-md-6">
                <div class="form-group" id="inputField1" {% if keyword_col_option != 'Keywords' %}style="display: none;"{% endif %}>
                    <label for="inputText1_option">Must Fix :</label>
                    <input type="text" class="form-control" id="inputText1_option" name="inputText1_option" {% if keyword_col_option == 'Keywords' %}placeholder="mustfix"{% else %}style="display: none;"{% endif %}>

                </div>
            </div>
        </div>
                    </div>
                    <label for="checkbox">Uncheck to Exclude Must Fix:</label>
                    <div class="row mt-2" name="checkbox">
                        <div class="col">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="checkbox_1" id="checkbox_1" checked>
                                <label class="form-check-label" for="checkbox_1">Any Blocker Scope(No SR)</label>
                            </div>
                        </div>
                        <div class="col">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="checkbox_2" id="checkbox_2" checked>
                                <label class="form-check-label" for="checkbox_2">Any Scope Fixed</label>
                            </div>
                        </div>
                            <div class="col">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="checkbox_3" id="checkbox_3" checked>
                                <label class="form-check-label" for="checkbox_3">reproducible</label>
                            </div>
                        </div>
                        <div class="col">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="checkbox_4" id="checkbox_4" checked>
                                <label class="form-check-label" for="checkbox_4">Checkbox 4</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Filter</button>
                </form>
            </div>
        </div>
        {% if file_available %}
        <div class="row">
            <div class="col">
                <p class="mt-3">Total Rows: {{ row_count }}</p>
                <a href="{{ url_for('download') }}" class="btn btn-success mt-3" download>Download File</a>
            </div>
        </div>
        {% endif %}
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>

<script>
    function validateForm() {
        var thresholdValue = document.getElementsByName('threshold_value')[0].value;
        if (isNaN(thresholdValue)) {
            var errorMessage = document.getElementById('error-message');
            errorMessage.innerHTML = "Please enter a valid number for the threshold.";
            errorMessage.style.display = "block";
            return false;
        }
        return true;
    }

$(document).ready(function() {
            // Show/hide input text field based on dropdown selection
            $('#dropdown').on('change', function() {
                var selectedOption = $(this).val();
                if (selectedOption === 'Keywords') {
                    $('#inputField1').show();
                    $('#inputText1_option').attr('placeholder', 'Enter your text');
                }
            });

            // Show the input field if Option1 is the default selected option
            if ($('#dropdown').val() === 'Keywords') {
                $('#inputField1').show();
            }
        });

</script>

</body>
</html>
